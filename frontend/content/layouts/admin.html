<!DOCTYPE html>
<html lang="en" class="h-full" style="overflow-y: scroll;">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>[[title]][[siteName]]</title>
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
        [[cssHref]] [[jsSrc]]
        [[pageHead]]
        <script>
        window.onReady = function(fn) {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', fn);
            } else {
                fn();
            }
        };
        </script>
    </head>
    <body class="h-full" hx-boost="true" hx-ext="client-side-templates" hx-target="#app" hx-select="#app" hx-swap="outerHTML">
        <header
            class="fixed top-0 inset-x-0 border-b z-50 bg-gradient-to-r from-blue-900 via-blue-700 to-violet-600 text-white"
        >
            <div class="h-14 flex items-center gap-4 px-6">
                <h4 class="text-lg font-bold tracking-tight">
                    <a href="/admin/" class="hover:text-slate-300">[[siteName]] Admin</a>
                </h4>
                <nav class="flex flex-row gap-4 text-sm">
                    <a data-nav-section="/admin/users/" href="/admin/users/" data-requires-permission="admin.access" hidden class="hover:text-slate-300">Users</a>
                </nav>
                <a href="/" class="ml-auto text-sm text-blue-200/70 hover:text-white hover:underline">&larr; Back to App</a>
                <a
                    href="/api/auth/logout"
                    id="logout-link"
                    class="text-sm text-blue-200/70 hover:text-white hover:underline"
                    hx-get="/api/auth/logout"
                    hx-swap="none"
                >Logout</a>
            </div>
            <nav class="h-10 flex flex-row flex-wrap items-center gap-4 px-6 text-sm text-slate-300 bg-blue-950">
                <span data-subnav="/admin/users/" class="hidden contents">
                    <a data-nav href="/admin/users/accounts/" class="hover:text-white">Accounts</a>
                    <a data-nav href="/admin/users/permissions/" class="hover:text-white">Permissions</a>
                    <a data-nav href="/admin/users/roles/" class="hover:text-white">Roles</a>
                </span>
            </nav>
        </header>
        <main id="app" data-layout="admin" class="p-6 pt-28 pb-20" style="opacity: 0">[[app]]</main>
        <footer
            class="fixed bottom-0 inset-x-0 px-6 py-4 border-t bg-slate-200 z-50 pb-[calc(1rem+env(safe-area-inset-bottom))] flex items-center"
        >
            <p class="text-xs text-slate-500 ml-auto">
                [[copyright]] |
                <a href="/" class="hover:underline">Home</a> |
                <a href="/admin/" class="hover:underline">Admin</a>
            </p>
        </footer>
        <modal></modal>
        <toast></toast>
        <confirm-dialog></confirm-dialog>
        <component file="auth/login-modal.html"></component>

        <script>
        document.getElementById('logout-link')?.addEventListener('htmx:afterRequest', function(e) {
            if (e.detail.successful) {
                window.location.href = '/';
            }
        });
        </script>
    </body>
</html>
