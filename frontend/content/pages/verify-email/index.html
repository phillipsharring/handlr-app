<layout name="base" title="Verify Email" />

<div class="max-w-sm mx-auto mt-10">
    <h1 class="text-xl font-bold text-slate-700 text-center mb-6">Verify Email</h1>

    <div class="bg-white border border-slate-200 rounded-lg p-6">
        <!-- Loading state -->
        <div id="verify-loading" class="text-center py-4">
            <p class="text-sm text-slate-500">Verifying your email...</p>
        </div>

        <!-- Success state -->
        <div id="verify-success" class="hidden text-center py-4">
            <p class="text-sm text-slate-600">Your email has been verified.</p>
            <a href="/" class="inline-block mt-3 rounded px-5 py-2 bg-slate-800 text-white hover:bg-slate-700 font-medium text-sm no-underline">Continue</a>
        </div>

        <!-- Error state -->
        <div id="verify-error" class="hidden text-center py-4">
            <p id="verify-error-message" class="text-sm text-slate-600"></p>
            <button type="button" id="verify-resend-btn" class="mt-3 text-sm text-slate-700 hover:text-slate-900 font-medium">Resend verification email</button>
        </div>

        <!-- No token state -->
        <div id="verify-missing" class="hidden text-center py-4">
            <p class="text-sm text-slate-600">No verification token found.</p>
        </div>
    </div>
</div>

<script>
window.onReady(function() {
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    var loading = document.getElementById('verify-loading');
    var success = document.getElementById('verify-success');
    var error = document.getElementById('verify-error');
    var missing = document.getElementById('verify-missing');
    var errorMsg = document.getElementById('verify-error-message');

    if (!token) {
        loading.classList.add('hidden');
        missing.classList.remove('hidden');
        return;
    }

    fetch('/api/auth/verify-email?token=' + encodeURIComponent(token), {
        credentials: 'same-origin'
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
        loading.classList.add('hidden');
        if (res.ok) {
            success.classList.remove('hidden');
        } else {
            errorMsg.textContent = res.data.message || 'Unable to verify email.';
            error.classList.remove('hidden');
        }
    })
    .catch(function() {
        loading.classList.add('hidden');
        errorMsg.textContent = 'Something went wrong. Please try again.';
        error.classList.remove('hidden');
    });

    // Resend button
    document.getElementById('verify-resend-btn').addEventListener('click', function() {
        fetch('/api/auth/resend-verification', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(function() {
            App.ui.toast.show({ message: 'Verification email sent. Check your inbox.', status: 'success' });
        })
        .catch(function() {
            App.ui.toast.show({ message: 'Could not send verification email.', status: 'error' });
        });
    });
});
</script>
