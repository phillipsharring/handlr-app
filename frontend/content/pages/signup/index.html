<layout name="base" title="Sign Up" />

<div class="max-w-sm mx-auto mt-10">
    <h1 class="text-xl font-bold text-slate-700 text-center mb-6">Create an Account</h1>

    <div class="bg-white border border-slate-200 rounded-lg p-6">
        <form
            class="space-y-4"
            method="post"
            action="/api/auth/signup"
            hx-ext="json-enc"
            hx-post="/api/auth/signup"
            hx-target="#global-toast-content"
            hx-swap="innerHTML"
            handlebars-template="global-toast-template"
            hx-disabled-elt="button[type='submit']"
            data-form-errors="inline"
        >
            <div class="form-field">
                <label for="signup-username" class="block text-sm font-medium">Username</label>
                <input
                    type="text"
                    name="username"
                    id="signup-username"
                    class="mt-1 border rounded px-3 py-2 w-full"
                    placeholder="Letters, numbers, and underscores"
                    autocomplete="username"
                    minlength="3"
                    maxlength="30"
                    pattern="^[a-zA-Z0-9_]+$"
                    required
                />
                <p class="mt-1 text-xs text-slate-400">3-30 characters.</p>
                <div class="field-error-text hidden"></div>
            </div>

            <div class="form-field">
                <label for="signup-email" class="block text-sm font-medium">Email</label>
                <input
                    type="email"
                    name="email"
                    id="signup-email"
                    class="mt-1 border rounded px-3 py-2 w-full"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
                />
                <div class="field-error-text hidden"></div>
            </div>

            <div class="form-field">
                <label for="signup-password" class="block text-sm font-medium">Password</label>
                <input
                    type="password"
                    name="password"
                    id="signup-password"
                    class="mt-1 border rounded px-3 py-2 w-full"
                    placeholder="Min 8 characters"
                    autocomplete="new-password"
                    minlength="8"
                    required
                />
                <div class="field-error-text hidden"></div>
            </div>

            <div class="form-field">
                <label for="signup-password-confirmation" class="block text-sm font-medium">Confirm Password</label>
                <input
                    type="password"
                    name="password_confirmation"
                    id="signup-password-confirmation"
                    class="mt-1 border rounded px-3 py-2 w-full"
                    placeholder="Repeat your password"
                    autocomplete="new-password"
                    required
                />
                <div class="field-error-text hidden"></div>
            </div>

            <button
                type="submit"
                class="w-full rounded px-3 py-2 bg-slate-800 text-white hover:bg-slate-700 font-medium"
            >Sign Up</button>
        </form>

        <p class="mt-4 text-center text-sm text-slate-500">
            Already have an account?
            <a href="/login/" class="text-slate-700 hover:text-slate-900 font-medium">Login</a>
        </p>
    </div>
</div>

<script>
var signupForm = document.querySelector('#app form[action="/api/auth/signup"]');
if (signupForm) {
    signupForm.addEventListener('htmx:afterRequest', function(e) {
        if (!e.detail.successful) return;
        try {
            var data = JSON.parse(e.detail.xhr.responseText);
            App.ab.capture('signup');
            if (data.meta && data.meta.redirect) {
                window.location.href = data.meta.redirect;
            }
        } catch (_) {}
    });
}
</script>
