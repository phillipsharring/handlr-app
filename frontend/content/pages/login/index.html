<layout name="base" title="Login" />

<div class="max-w-sm mx-auto mt-10">
    <h1 class="text-xl font-bold text-slate-700 text-center mb-6">Login</h1>

    <div class="bg-white border border-slate-200 rounded-lg p-6">
        <form
            class="space-y-4"
            method="post"
            action="/api/auth/login"
            hx-ext="json-enc"
            hx-post="/api/auth/login"
            hx-target="#global-toast-content"
            hx-swap="innerHTML"
            handlebars-template="global-toast-template"
            hx-disabled-elt="button[type='submit']"
            data-form-errors="inline"
        >
            <div class="form-field">
                <label for="login-email" class="block text-sm font-medium">Email</label>
                <input
                    type="email"
                    name="email"
                    id="login-email"
                    class="mt-1 border rounded px-3 py-2 w-full"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
                />
                <div class="field-error-text hidden"></div>
            </div>

            <div class="form-field">
                <label for="login-password" class="block text-sm font-medium">Password</label>
                <input
                    type="password"
                    name="password"
                    id="login-password"
                    class="mt-1 border rounded px-3 py-2 w-full"
                    placeholder="Your password"
                    autocomplete="current-password"
                    required
                />
                <div class="field-error-text hidden"></div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 text-sm text-slate-500">
                    <input type="checkbox" name="remember_me" value="1" class="rounded" />
                    Remember me
                </label>
                <a href="/forgot-password/" class="text-sm text-slate-500 hover:text-slate-700">Forgot password?</a>
            </div>

            <button
                type="submit"
                class="w-full rounded px-3 py-2 bg-slate-800 text-white hover:bg-slate-700 font-medium"
            >Login</button>
        </form>

        <p class="mt-4 text-center text-sm text-slate-500">
            Don't have an account?
            <a href="/signup/" class="text-slate-700 hover:text-slate-900 font-medium">Sign Up</a>
        </p>
    </div>
</div>

<script>
var loginForm = document.querySelector('#app form[action="/api/auth/login"]');
if (loginForm) {
    loginForm.addEventListener('htmx:afterRequest', function(e) {
        if (!e.detail.successful) return;
        try {
            var data = JSON.parse(e.detail.xhr.responseText);
            if (data.meta && data.meta.redirect) {
                window.location.href = data.meta.redirect;
            }
        } catch (_) {}
    });
}
</script>
