<layout name="admin" title="Role Detail" />

<div class="space-y-6">
    <div class="flex items-center gap-3">
        <component file="back-link.html" href="/admin/users/roles/">Back to Roles</component>
    </div>

    <component file="admin-detail-loader.html"
        id="role-detail" trigger="load, reload-role-detail-event from:body"
        template="role-detail-template" class="space-y-6"
    >(Loading role...)</component>

    <div id="permissions-section">
        <div class="border rounded">
            <div class="flex items-center justify-between px-4 py-3 bg-slate-50 border-b">
                <h2 class="text-sm font-semibold text-slate-700">Permissions</h2>
            </div>
            <component file="admin-detail-loader.html"
                id="permissions-form-container" url="/api/admin/permissions"
                trigger="load, reload-role-detail-event from:body"
                template="permissions-form-template" class="p-4" small
            >(Loading permissions...)</component>
        </div>
    </div>

    <template id="role-detail-template">
        <input id="role-permission-ids" type="hidden" value="{{json permission_ids}}" />
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold">{{name}}</h1>
                <div class="mt-2 flex items-center gap-2">
                    <span class="font-mono text-sm text-slate-600">ID: {{id}}</span>
                </div>
            </div>
            <div>
                <button
                    id="open-edit-role-modal"
                    type="button"
                    class="border rounded px-4 py-2 hover:bg-slate-50"
                    data-role-id="{{id}}"
                    data-role-name="{{name}}"
                >
                    Edit
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="border rounded p-4 bg-slate-50">
                <h2 class="text-sm font-semibold text-slate-700 mb-2">Details</h2>
                <div class="space-y-2 text-sm">
                    <div class="flex gap-2">
                        <span class="text-slate-500 w-28">Created:</span>
                        <span class="font-mono">{{formatDateTime created_at}}</span>
                    </div>
                    <div class="flex gap-2">
                        <span class="text-slate-500 w-28">Updated:</span>
                        <span class="font-mono">{{formatDateTime updated_at}}</span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="permissions-form-template">
        <form
            id="permissions-form"
            class="space-y-3"
            hx-ext="json-enc"
            hx-patch=""
            hx-target="#global-toast-content"
            hx-swap="innerHTML"
            handlebars-template="global-toast-template"
            hx-disabled-elt="button[type='submit']"
            data-refresh-event="reload-role-detail-event"
            data-form-errors="inline"
        >
            {{#each data}}
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="{{id}}" class="permission-checkbox rounded" />
                <span class="text-sm font-medium">{{name}}</span>
            </label>
            {{/each}}

            <div class="pt-2">
                <button type="submit" class="rounded px-3 py-2 bg-slate-900 text-white hover:bg-slate-800 text-sm">
                    Save permissions
                </button>
            </div>
        </form>
    </template>

    <template src="_edit-role-form" id="edit-role-form-template"
        refresh='data-refresh-event="reload-role-detail-event"'></template>
</div>

<script>
function getRoleId() {
    const params = App.getRouteParams?.('/admin/users/roles/[id]/');
    return params?.id || null;
}

function initHtmxUrls() {
    const roleId = getRoleId();
    if (!roleId) {
        document.getElementById('role-detail').innerHTML = '<div class="text-red-600">No role ID in URL</div>';
        return;
    }

    const roleDetail = document.getElementById('role-detail');
    if (roleDetail) {
        roleDetail.setAttribute('hx-get', `/api/admin/roles/${roleId}`);
    }

    window.htmx?.process?.(roleDetail);
}

function initPermissionsForm() {
    const roleId = getRoleId();
    if (!roleId) return;

    const roleDetail = document.getElementById('role-detail');
    const permissionsForm = document.getElementById('permissions-form');
    if (!permissionsForm) return;

    // Set the PATCH URL for the permissions form
    permissionsForm.setAttribute('hx-patch', `/api/admin/roles/${roleId}/permissions`);
    window.htmx?.process?.(permissionsForm);

    // Get permission_ids from the role detail response (stored in a hidden input).
    // This may not exist yet if role-detail hasn't loaded — that's fine,
    // we'll be called again when role-detail swaps.
    const permissionIdsInput = roleDetail?.querySelector('#role-permission-ids');
    if (permissionIdsInput) {
        const permissionIds = JSON.parse(permissionIdsInput.value || '[]');
        permissionsForm.querySelectorAll('.permission-checkbox').forEach(function(cb) {
            cb.checked = permissionIds.includes(parseInt(cb.value));
        });
    }

    // Collect checked permission IDs and set as a JSON string.
    // Guard against duplicate listeners on re-init.
    if (!permissionsForm.dataset.configWired) {
        permissionsForm.dataset.configWired = 'true';
        permissionsForm.addEventListener('htmx:configRequest', function(e) {
            var checked = permissionsForm.querySelectorAll('.permission-checkbox:checked');
            var ids = Array.from(checked).map(function(cb) { return parseInt(cb.value); });
            e.detail.parameters.permission_ids = JSON.stringify(ids);
        });
    }
}

// Both loads race — whichever finishes second triggers the checkbox wiring.
document.getElementById('role-detail').addEventListener('htmx:afterSwap', function() {
    initPermissionsForm();
});
document.getElementById('permissions-form-container').addEventListener('htmx:afterSwap', function() {
    initPermissionsForm();
});

// Modal handlers
function openEditRoleModal(btn) {
    App.ui.openFormModal({
        templateId: 'edit-role-form-template',
        title: 'Edit role',
        formUrl: `/api/admin/roles/${btn.dataset.roleId}`,
        formMethod: 'patch',
        fields: {
            name: btn.dataset.roleName,
        },
    });
}

document.getElementById('role-detail').addEventListener('click', function(e) {
    const btn = e.target.closest('#open-edit-role-modal');
    if (btn) openEditRoleModal(btn);
});

window.onReady(initHtmxUrls);
</script>
