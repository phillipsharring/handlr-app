<!-- Auth links: shows login link or user menu based on auth status -->
<span id="auth-links" class="inline-flex gap-3 text-sm text-slate-500">
    <a
        href="/signup/"
        data-auth-login
        class="transition-opacity hover:underline hover:text-slate-800"
        hidden
    >Sign Up</a>
    <a
        href="/login/"
        data-auth-login
        class="transition-opacity hover:underline hover:text-slate-800"
        hidden
    >Login</a>
    <div data-auth-logout class="relative" hidden>
        <button
            type="button"
            id="user-menu-btn"
            class="flex items-center gap-1.5 text-slate-500 hover:text-slate-800 transition-colors"
            aria-haspopup="true"
            aria-expanded="false"
        >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"/></svg>
            <span id="user-menu-username" class="text-sm font-medium max-w-[8rem] truncate"></span>
            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/></svg>
        </button>
        <div
            id="user-menu-dropdown"
            class="absolute right-0 top-full mt-2 w-36 rounded-lg bg-white shadow-lg ring-1 ring-stone-200 py-1 z-50"
            hidden
        >
            <a
                href="/profile/"
                class="block px-4 py-2 text-sm text-stone-700 hover:bg-stone-100 transition-colors"
            >Profile</a>
            <a
                href="/"
                class="block px-4 py-2 text-sm text-stone-700 hover:bg-stone-100 transition-colors"
                hx-get="/api/auth/logout"
                hx-swap="none"
                hx-on::after-request="window.location.href='/'"
            >Logout</a>
            <div data-requires-permission="admin.access" hidden>
                <hr class="my-1 border-stone-200">
                <a
                    href="/admin/"
                    class="block px-4 py-2 text-sm text-stone-700 hover:bg-stone-100 transition-colors"
                >Admin</a>
            </div>
        </div>
    </div>
</span>
<script>
(function() {
    function initUserMenu() {
        var btn = document.getElementById('user-menu-btn');
        var dropdown = document.getElementById('user-menu-dropdown');
        if (!btn || !dropdown) return;

        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var open = !dropdown.hidden;
            dropdown.hidden = open;
            btn.setAttribute('aria-expanded', String(!open));
        });

        document.addEventListener('click', function(e) {
            if (!dropdown.hidden && !dropdown.contains(e.target)) {
                dropdown.hidden = true;
                btn.setAttribute('aria-expanded', 'false');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !dropdown.hidden) {
                dropdown.hidden = true;
                btn.setAttribute('aria-expanded', 'false');
            }
        });
    }
    window.onReady(initUserMenu);
})();
</script>
