<!-- Handlebars template: confirm dialog content (rendered into the global modal) -->
<template id="global-confirm-template">
    <div class="p-6">
        <div class="text-center">
            <p class="confirm-message text-base font-medium">{{message}}</p>
            {{#if subtext}}
            <p class="confirm-subtext mt-2 text-sm">{{subtext}}</p>
            {{/if}}
            {{#if checkboxLabel}}
            <label class="confirm-checkbox mt-3 inline-flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" data-confirm-checkbox />
                {{checkboxLabel}}
            </label>
            {{/if}}
        </div>

        <div class="mt-6 flex justify-center gap-3">
            <button type="button" class="confirm-cancel-btn border rounded px-4 py-2" data-confirm-cancel>
                {{cancelText}}
            </button>
            <button
                type="button"
                class="confirm-ok-btn rounded px-4 py-2"
                data-confirm-ok
            >
                {{confirmText}}
            </button>
        </div>
    </div>
</template>
