<!-- Standard global modal (hidden by default). HTMX can target #global-modal-content. -->
<div id="global-modal" class="fixed inset-0 z-[60]" aria-hidden="true" style="opacity: 0; visibility: hidden;">
    <div class="absolute inset-0 bg-black/50" data-modal-close></div>

    <!-- Takeover close button (only visible in takeover mode) -->
    <button
        type="button"
        class="takeover-close-btn hidden absolute top-4 right-4 z-20 rounded-full p-2 text-slate-500 hover:text-slate-800 hover:bg-white/50"
        data-modal-close
        aria-label="Close modal"
    >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>

    <!-- pointer-events-none lets background clicks hit the overlay; the dialog re-enables pointer events -->
    <div class="relative z-10 flex min-h-full items-end sm:items-center justify-center p-4 pointer-events-none">
        <div
            class="w-full max-w-xl max-h-[calc(100dvh-2rem)] rounded-lg border bg-white shadow-lg pointer-events-auto flex flex-col"
            role="dialog"
            aria-modal="true"
            aria-labelledby="global-modal-title"
            tabindex="-1"
        >
            <div id="global-modal-header" class="flex items-center justify-between gap-3 border-b p-4">
                <h3 id="global-modal-title" class="text-base font-semibold text-slate-900">Modal</h3>
                <button
                    type="button"
                    class="rounded px-2 py-1 text-slate-700 hover:bg-slate-100"
                    data-modal-close
                    aria-label="Close modal"
                    id="global-modal-close-btn"
                >
                    ✕
                </button>
            </div>

            <div id="global-modal-content" class="p-4 overflow-auto">
                <!-- HTMX content will render here -->
            </div>
        </div>
    </div>
</div>
