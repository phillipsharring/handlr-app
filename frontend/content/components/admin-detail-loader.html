<div
    id="[[{id}]]"
    [[#if url]]hx-get="[[{url}]]"[[/if]]
    hx-trigger="[[{trigger}]]"
    hx-target="this"
    hx-select="unset"
    hx-swap="innerHTML"
    [[#if template]]handlebars-template="[[{template}]]"[[/if]]
    [[#if array-template]]handlebars-array-template="[[{array-template}]]"[[/if]]
>
    <div class="text-slate-500[[#if small]] text-sm[[/if]]">[[slot]]</div>
</div>
