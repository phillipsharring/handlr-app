<tbody
    id="[[{id}]]"
    [[#if url]]hx-get="[[{url}]]"[[/if]]
    hx-trigger="[[{trigger}]]"
    hx-target="this"
    hx-select="unset"
    hx-swap="innerHTML"
    handlebars-array-template="[[{template}]]"
    [[#if paginated]]data-pagination-target="#pagination-content"
    data-pagination-template="pagination-template"
    data-pagination-source="#[[{id}]]"
    data-pagination-param="page"[[/if]]
>
    <tr>
        <td class="px-4 py-3 text-slate-500 align-top" colspan="[[{colspan}]]">[[slot]]</td>
    </tr>
</tbody>
