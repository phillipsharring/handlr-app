<div class="rounded border p-4 bg-slate-50">
    <p class="font-semibold">Title: [[title]]</p>
    [[#if subtle]]
    <p class="mt-1 text-slate-500 text-sm">Subtle mode is ON.</p>
    [[else]]
    <p class="mt-1 text-slate-500 text-sm">Subtle mode is OFF.</p>
    [[/if]]
    <div class="mt-2">[[slot]]</div>
</div>
